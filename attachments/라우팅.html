<!DOCTYPE html>
<html lang="ko"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        
        <title>라우팅</title>
    </head>
    <body>
        <div>
            <ul>
                <li>
                    아래에 게이트웨이 주소 입력 후, 명령어 CMD에 붙여넣기
                </li>
                <li>
                    *초기화 명령어 : route -f
                </li>
                <li>
                    *로컬 네트워크(127.0.0.1)이 안될 시, 다시 시작 실행
                </li>
                <li>
                    *<a href="https://blog.naver.com/devch/220805952113" target="_blank">링크</a> : '3. 네트워크 인터페이스 번호 기억하기' 부분 참고
                </li>
            </ul>
            <h5>무선랜</h5>
            <label for="2">게이트웨이</label>
            <input type="text" id="1" value="192.168.0.1" oninput="change()">
        </div>
        <div>
            <h5>유선랜</h5>
            <label for="2">게이트웨이</label>
            <input type="text" id="2" value="172.18.4.1" oninput="change()">
        </div>
        
        <div>
            <pre>                
                <code id="result"></code>
            </pre>
        </div>
    

    <script>
        change();

        function change() {
            const wirelessGateway = document.getElementById('1').value;
            const wiredGateway = document.getElementById('2').value;
            
            const template = `
:: 기존 라우트 테이블 삭제
route -f

:: 외부망 연결
route add 0.0.0.0 mask 0.0.0.0 ${wirelessGateway} -p

::내부망 연결
route add 172.18.4.0 mask 255.255.255.0 ${wiredGateway} -p

:: SVN 연결
route add 172.18.0.0 mask 255.255.0.0 ${wiredGateway} -p

:: DB 연결
route add 203.253.0.0 mask 255.255.0.0 ${wiredGateway} -p

:: 하이웨어
route add 192.203.138.101 mask 255.255.255.255 ${wiredGateway} -p

:: 아래는 정확히 잘 모름 (정영은 부장이 보낸 테이블에 포함되어 있음)
route add 192.203.138.110 mask 255.255.255.255 ${wiredGateway} -p
route add 192.203.138.11 mask 255.255.255.255 ${wiredGateway} -p
`

            document.getElementById('result').innerText = template;
        }
    </script>
</body></html>
